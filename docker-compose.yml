# CareStickers: PostgreSQL + API (serves Vite build from dist/).
#
# Full stack (DB created on first volume init + app):
#   ./scripts/docker-up.sh
#   ./scripts/docker-up.ps1
#   npm run docker:up
#
# Postgres only (run `npm run dev` on host; point DATABASE_URL at localhost:5432):
#   docker compose up -d db

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-care}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-care}
      POSTGRES_DB: ${POSTGRES_DB:-carestickers}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - carestickers_pg:/var/lib/postgresql/data
      # Canonical app-table schema (single source). 0002_auth_link.sql is intentionally NOT
      # mounted: it references the Supabase-managed `auth` schema, which this plain Postgres
      # container does not have. For full Supabase Auth parity locally, use `supabase start`.
      - ./supabase/migrations/0001_initial_schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-care}:${POSTGRES_PASSWORD:-care}@db:5432/${POSTGRES_DB:-carestickers}
      # Local Docker Postgres does not speak TLS; disable SSL for the in-network connection.
      PGSSL: ${PGSSL:-disable}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      PORT: "3001"
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Supabase Auth verification: the server validates access tokens against the project JWKS.
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-}
      APPLY_SCHEMA: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  carestickers_pg:
