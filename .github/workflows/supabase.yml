name: Supabase

# Applies database migrations to the linked Supabase project on merge to main, and on PRs
# guards against schema drift (lint + generated-types check).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   Account Personal Access Token from
#                           https://supabase.com/dashboard/account/tokens
#                           Format: sbp_ + 40 lowercase hex chars (NOT a project API key)
#   SUPABASE_DB_PASSWORD    Database password for the linked project
#   SUPABASE_PROJECT_ID     Project ref from Project Settings → General (20-char id)

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  pull_request:
    paths:
      - "supabase/**"
      - "src/types/database.ts"
      - ".github/workflows/supabase.yml"

permissions:
  contents: read

jobs:
  drift-check:
    name: Lint + types drift guard
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v2
        with:
          version: 2.108.0
      - name: Validate CI secrets
        run: |
          missing=0
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set."
            missing=1
          elif ! echo "$SUPABASE_ACCESS_TOKEN" | grep -Eq '^sbp_(oauth_)?[a-f0-9]{40}$'; then
            echo "::error::SUPABASE_ACCESS_TOKEN must be a Personal Access Token from https://supabase.com/dashboard/account/tokens (format: sbp_ followed by 40 hex characters). Project keys such as sb_publishable_..., sb_secret_..., anon, or service_role keys will not work."
            missing=1
          fi
          if [ -z "${SUPABASE_PROJECT_ID}" ]; then
            echo "::error::SUPABASE_PROJECT_ID secret is not set. Use the project ref from Project Settings → General (e.g. smicamiarzmqnyuwyyhl)."
            missing=1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set. Use the database password from Project Settings → Database."
            missing=1
          fi
          exit "$missing"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Lint migrations
        run: supabase db lint --linked
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        continue-on-error: true
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Verify generated types are committed and up to date
        run: |
          supabase gen types typescript --linked > src/types/database.generated.ts
          if ! diff -q src/types/database.ts src/types/database.generated.ts; then
            echo "::error::src/types/database.ts is out of date. Run 'npm run db:types' and commit the result."
            diff src/types/database.ts src/types/database.generated.ts || true
            exit 1
          fi

  db-push:
    name: Apply migrations
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v2
        with:
          version: 2.108.0
      - name: Validate CI secrets
        run: |
          missing=0
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set."
            missing=1
          elif ! echo "$SUPABASE_ACCESS_TOKEN" | grep -Eq '^sbp_(oauth_)?[a-f0-9]{40}$'; then
            echo "::error::SUPABASE_ACCESS_TOKEN must be a Personal Access Token from https://supabase.com/dashboard/account/tokens (format: sbp_ followed by 40 hex characters). Project keys such as sb_publishable_..., sb_secret_..., anon, or service_role keys will not work."
            missing=1
          fi
          if [ -z "${SUPABASE_PROJECT_ID}" ]; then
            echo "::error::SUPABASE_PROJECT_ID secret is not set. Use the project ref from Project Settings → General (e.g. smicamiarzmqnyuwyyhl)."
            missing=1
          fi
          if [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not set. Use the database password from Project Settings → Database."
            missing=1
          fi
          exit "$missing"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
